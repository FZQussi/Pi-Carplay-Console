<!DOCTYPE html>
<html>
<head>
    <title>AveoOS</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Barra de topo -->
<div class="top-bar">
    <div id="time">00:00</div>
    <div id="bt-status">⚫ Sem Bluetooth</div>
</div>

<!-- Menu principal -->
<div class="screen" id="screen-home">
    <div class="app-grid">
        <div class="app-icon" onclick="showScreen('screen-music')">
            <div class="app-icon-img">🎵</div>
            <div class="app-icon-label">Música</div>
       </div>
        <div class="app-icon" onclick="showScreen('screen-settings')">
            <div class="app-icon-img">⚙️</div>
            <div class="app-icon-label">Definições</div>
       </div>
   </div>
</div>

<!-- Página de música -->
<div class="screen hidden" id="screen-music">
    <div class="music-page">
        <button class="back-btn" onclick="showScreen('screen-home')">← Voltar</button>
        <div class="album-art" id="album-art">🎵</div>
        <div class="track-info">
            <div class="track-name" id="track">--</div>
            <div class="track-artist" id="artist">--</div>
       </div>
        <div class="lyrics-container" id="lyrics-container">
            <div class="lyrics-line">🎤 Letra não disponível</div>
       </div>
        <div class="controls">
            <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
            <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlay()">▶</button>
            <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
       </div>
        <button class="bt-connect-btn" onclick="makeDiscoverable()">🔵 Ligar Bluetooth</button>
   </div>
</div>

<!-- Página de definições -->
<div class="screen hidden" id="screen-settings">
    <div class="settings-page">
        <button class="back-btn" onclick="showScreen('screen-home')">← Voltar</button>
        <h2>Definições</h2>
        <div class="setting-item">
            <span>Dispositivo Bluetooth</span>
            <span id="bt-device-name">--</span>
       </div>
   </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
