<!DOCTYPE html>
<html lang="pt" data-theme="night">
<head>
    <title>AveoOS</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Splash de arranque: escondido pelo JS quando o primeiro estado chega. -->
<div class="splash" id="splash">
    <div class="splash-logo" data-icon="music"></div>
    <div class="splash-title">AveoOS</div>
</div>

<!-- Barra de topo -->
<div class="top-bar">
    <div id="time">00:00</div>
    <div class="top-bar-right">
        <!-- Indicador de sistema: só aparece quando há temperatura alta
             ou aviso de undervoltage/throttle (preenchido por JS). -->
        <div id="sys-status" class="hidden"></div>
        <div id="bt-status"><span data-icon="bluetooth-off"></span> Sem Bluetooth</div>
    </div>
</div>

<!-- Menu principal -->
<div class="screen" id="screen-home">
    <div class="app-grid">
        <div class="app-icon" onclick="showScreen('screen-music')">
            <div class="app-icon-img" data-icon="music"></div>
            <div class="app-icon-label">Música</div>
       </div>
        <div class="app-icon" onclick="showScreen('screen-settings')">
            <div class="app-icon-img" data-icon="settings"></div>
            <div class="app-icon-label">Definições</div>
       </div>
   </div>
</div>

<!-- Página de música -->
<div class="screen hidden" id="screen-music">
    <div class="music-page">
        <button class="back-btn" onclick="showScreen('screen-home')"><span data-icon="back"></span> Voltar</button>
        <div class="album-art" id="album-art" data-icon="music"></div>
        <div class="track-info">
            <div class="track-name" id="track">--</div>
            <div class="track-artist" id="artist">--</div>
       </div>
        <!-- Barra de progresso: toque salta para a posição (seek). -->
        <div class="progress-container" id="progress-container" onclick="seekTo(event)">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
        <div class="progress-times">
            <span id="time-current">0:00</span>
            <span id="time-total">--:--</span>
        </div>
        <div class="controls">
            <button class="ctrl-btn ctrl-btn-sm" id="shuffle-btn" data-icon="shuffle" onclick="toggleShuffle()"></button>
            <button class="ctrl-btn" data-icon="prev" onclick="prevTrack()"></button>
            <button class="ctrl-btn play-btn" id="play-btn" data-icon="play" onclick="togglePlay()"></button>
            <button class="ctrl-btn" data-icon="next" onclick="nextTrack()"></button>
            <button class="ctrl-btn ctrl-btn-sm" id="repeat-btn" data-icon="repeat" onclick="toggleRepeat()"></button>
       </div>
        <div class="volume-row">
            <span data-icon="volume"></span>
            <input type="range" min="0" max="100" value="50" id="volume-slider"
                   class="volume-slider" oninput="setVolume(this.value)">
        </div>
        <div class="lyrics-container" id="lyrics-container">
            <div class="lyrics-line"><span data-icon="mic"></span> Letra não disponível</div>
       </div>
        <button class="bt-connect-btn" onclick="makeDiscoverable()"><span data-icon="bluetooth"></span> Ligar Bluetooth</button>
   </div>
</div>

<!-- Página de definições -->
<div class="screen hidden" id="screen-settings">
    <div class="settings-page">
        <button class="back-btn" onclick="showScreen('screen-home')"><span data-icon="back"></span> Voltar</button>
        <h2>Definições</h2>
        <div class="setting-item">
            <span>Tema</span>
            <div class="theme-switch" id="theme-switch">
                <button data-theme-mode="auto" onclick="setTheme('auto')">Auto</button>
                <button data-theme-mode="day" onclick="setTheme('day')">Dia</button>
                <button data-theme-mode="night" onclick="setTheme('night')">Noite</button>
            </div>
       </div>
        <div class="setting-item">
            <span>Dispositivo Bluetooth</span>
            <span id="bt-device-name">--</span>
       </div>
   </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
