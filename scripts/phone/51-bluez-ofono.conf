# WirePlumber drop-in — telefone mãos-livres (HFP).
#
# Copiar para ~/.config/wireplumber/wireplumber.conf.d/ (ver setup-hfp.sh).
#
# Usa o backend HFP *nativo* do PipeWire (não o oFono daemon) e liga o modem
# nativo que expõe a API compatível org.ofono (org.ofono.VoiceCallManager) —
# é daí que o backend lê estado de chamada, atende, desliga e marca.
monitor.bluez.properties = {
  bluez5.enable-hfp = true
  bluez5.enable-msbc = true
  bluez5.hfphsp-backend = "native"
  bluez5.hfphsp-backend-native-modem = true
  bluez5.telephony.provide-ofono = true
}
